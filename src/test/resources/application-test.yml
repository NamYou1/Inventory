spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6380
      password: BBU@2026
      timeout: 3s
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Phnom_Penh

app:
  jwt:
    secret: test-secret-key-base64-encoded-for-testing-purposes
    access-expiration-seconds: 3600
    refresh-expiration-seconds: 86400

