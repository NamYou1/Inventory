spring:
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  application:
    name: Inventory

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # dev only → production should be "validate"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Phnom_Penh

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

#  data:
#    redis:
#      host: ${REDIS_HOST:localhost}
#      port: ${REDIS_PORT:6380}
#      password: ${REDIS_PASSWORD:}
#      timeout: 3s


# -------------------------
# CLOUDINARY CONFIG
# -------------------------
rustfs:
  endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
  access-key: ${RUSTFS_ACCESS_KEY:admin}
  secret-key: ${RUSTFS_SECRET_KEY:password123}
  bucket: ${RUSTFS_BUCKET:default-bucket}

aws:
  region: ${AWS_REGION:us-east-1}


# -------------------------
# JWT CONFIG
# -------------------------
app:
  jwt:
    secret: ${JWT_SECRET_BASE64:VGhpc0lzQVN0cm9uZ0RldmVsb3BtZW50S2V5VGhhdE11c3RCZUF0TGVhc3QzMkJ5dGVzTG9uZw==}
    access-expiration-seconds: ${JWT_ACCESS_EXP_SECONDS:9000}
    refresh-expiration-seconds: ${JWT_REFRESH_EXP_SECONDS:604800}


kind: Application