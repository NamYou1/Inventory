spring:
  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  application:
    name: Inventory

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # dev only → production should be "validate"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Phnom_Penh

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 3s


# -------------------------
# CLOUDINARY CONFIG
# -------------------------
rustfs:
  endpoint: ${RUSTFS_ENDPOINT}
  access-key: ${RUSTFS_ACCESS_KEY}
  secret-key: ${RUSTFS_SECRET_KEY}
  bucket: ${RUSTFS_BUCKET}

aws:
  region: ${AWS_REGION}


# -------------------------
# JWT CONFIG
# -------------------------
app:
  jwt:
    secret: ${JWT_SECRET_BASE64}
    access-expiration-seconds: ${JWT_ACCESS_EXP_SECONDS}
    refresh-expiration-seconds: ${JWT_REFRESH_EXP_SECONDS}


kind: Application