spring:
#  import: optional:file:.env[.properties]?
  application:
    name: Inventory
  datasource:
    url: jdbc:postgresql://localhost:5432/inventorydb
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Phnom_Penh
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Phnom_Penh
