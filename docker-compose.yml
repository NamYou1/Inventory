services:
  # --------------------------------------------------------
  # PostgreSQL Database Service
  # --------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: always
    environment:
      POSTGRES_DB: kk
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d kk" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # Redis Cache Service
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: inventory_cache
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # RustFS Object Storage (S3-Compatible)
  # --------------------------------------------------------
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_local
    restart: always
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console Port
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    command: >
      --address :9000 --console-enable /data
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9000 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # Spring Boot Inventory Application Service
  # --------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Database (Uses container name 'postgres' for container-to-container connection)
      DB_URL: jdbc:postgresql://postgres:5432/kk
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # Redis Cache (Uses container name 'redis' for container-to-container connection)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # JWT & Security config
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      JWT_ACCESS_EXP_SECONDS: ${JWT_ACCESS_EXP_SECONDS}
      JWT_REFRESH_EXP_SECONDS: ${JWT_REFRESH_EXP_SECONDS}

      # RustFS S3-Compatible configuration (Uses container name 'rustfs' for internal API calls)
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET}
      AWS_REGION: ${AWS_REGION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy

  # --------------------------------------------------------
  # Nginx Reverse Proxy Service (Gateway)
  # --------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: inventory_gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - rustfs

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
